# Skill-trigger evaluation fixture.
#
# These cases define EXPECTED routing for the clusters where misrouting is
# most plausible (measured in reports/claude-independent-audit.md). They are
# executed live by tests/skills/routing/run_eval.py, which seeds a
# domain-representative scratch repo per case (routing/seed-repo.sh), runs
# each prompt N times through headless `claude -p`, and writes machine-
# readable results to tests/skills/results/.
#
# Format per case:
#   id                  stable key joining fixture <-> seed <-> results
#   prompt              what the user says
#   must_load           skills that should activate (required primaries)
#   allowed_companions  skills that MAY legitimately co-load (not counted
#                       against precision; omit when none)
#   must_not_load       skills that must stay out (loading one = conflict)

layout_cluster:
  - id: layout-root-mess
    prompt: "Organize this project - the root is a mess"
    must_load: [project-layout]
    must_not_load: [python-layout, sql-layout, airflow-layout, frontend-layout, repository-cleanup]
  - id: layout-python-importable
    prompt: "Structure this Python project so it is importable"
    must_load: [python-layout]
    must_not_load: [project-layout]
  - id: layout-dags-by-team
    prompt: "Organize the dags folder by team"
    must_load: [airflow-layout]
    must_not_load: [airflow, project-layout]
  - id: layout-sql-proc-file
    prompt: "Where should this stored procedure file live?"
    must_load: [sql-layout]
    must_not_load: [database-review, database-migrations]
  - id: layout-frontend-components
    prompt: "Organize the frontend components folder"
    must_load: [frontend-layout]
    must_not_load: [project-layout, design-system]

review_cluster:
  - id: review-dag-deploy
    prompt: "Review this DAG before we deploy it"
    must_load: [airflow-review]
    allowed_companions: [airflow]   # review skill defers authoring standards to airflow
    must_not_load: [etl-review]
  - id: review-proc-deadlock
    prompt: "Review this stored procedure for deadlocks"
    must_load: [database-review]
    must_not_load: [sql-layout, database-migrations]
  - id: review-etl-counts
    prompt: "Review the whole pipeline - target counts do not match source"
    must_load: [etl-review]
    must_not_load: []
  - id: review-dtsx-thai
    prompt: "Review the dtsx package, Thai characters look wrong"
    must_load: [ssis-review]
    must_not_load: [database-review]
  - id: review-api-breaking
    prompt: "Is this endpoint change a breaking change?"
    must_load: [api-review]
    must_not_load: [api-design, fastapi-review]
  - id: review-gha-change
    prompt: "Review the GitHub Actions change"
    must_load: [ci-review]
    must_not_load: [airflow-review]

git_hygiene_scope:   # post-fix expectations (triggers narrowed 2026-07-17)
  - id: move-utils-file
    prompt: "Move utils.py into the helpers folder"
    must_load: []            # one-off move: no workflow skill should fire
    must_not_load: [git-hygiene, repository-cleanup]
  - id: cleanup-branch-sequence
    prompt: "Set up the cleanup branch and commit sequence for the restructure"
    must_load: [git-hygiene]
    must_not_load: []
  - id: untrack-node-modules
    prompt: "Stop tracking node_modules"
    must_load: [git-hygiene]
    must_not_load: [repository-cleanup]
  - id: cleanup-repo-recall
    prompt: "Clean up this repo and prepare it for team handover"
    must_load: [repository-cleanup]
    must_not_load: []

security_cluster:
  - id: secret-scan-repo
    prompt: "Scan the repo for committed secrets before we go public"
    must_load: [security-review]
    must_not_load: [web-security, ci-review]
  - id: login-session-cookies
    prompt: "Add login with session cookies"
    must_load: [web-security]
    must_not_load: [security-review]

engine_specificity:  # post-fix expectations (engine labels added 2026-07-17)
  - id: pg-query-performance
    prompt: "Review this PostgreSQL query for performance"
    must_load: []            # database-review is T-SQL-labeled; generic §14 applies
    allowed_companions: [database-review]   # MAY load as structural guidance
    must_not_load: []
    note: "database-review MAY load as structural guidance; its body now states T-SQL specificity."

airflow_authoring_vs_review:
  - id: dag-create-orders
    prompt: "Create an Airflow DAG that loads yesterday's orders"
    must_load: [airflow]
    must_not_load: [airflow-review, etl-review]
  - id: dag-add-retry
    prompt: "Add retry behavior to this Airflow task"
    must_load: [airflow]
    must_not_load: [airflow-review]

# v7: positive coverage for the 21 skills that had none, so every one of the
# 37 skills has at least one case where it is the required primary. must_not
# entries encode the nearest-neighbor boundary each description states.
full_coverage_positive:
  - id: cov-agent-design
    prompt: "Design an agent that triages support tickets with tools - what guardrails does it need?"
    must_load: [agent-design]
    must_not_load: [prompt-engineering, llm-evaluation]
  - id: cov-api-design
    prompt: "Add a versioned endpoint to list orders with pagination"
    must_load: [api-design]
    allowed_companions: [fastapi-review]   # authoring in a FastAPI repo; framework guidance may co-load
    must_not_load: [api-review]
  - id: cov-config-management
    prompt: "Where should the database timeout setting live, and how should the app load it?"
    must_load: [config-management]
    must_not_load: [python-layout]
  - id: cov-database-migrations
    prompt: "Add a nullable column to the users table with a migration"
    must_load: [database-migrations]
    must_not_load: [database-review, sql-layout]
  - id: cov-dependency-review
    prompt: "Audit the dependencies for unused or outdated packages"
    must_load: [dependency-review]
    must_not_load: []
  - id: cov-design-system
    prompt: "Should this new button be a variant of the shared Button component?"
    must_load: [design-system]
    must_not_load: [ui-review, frontend-layout]
  - id: cov-docker
    prompt: "Containerize this service with a small production image"
    must_load: [docker]
    must_not_load: [docker-review, kubernetes]
  - id: cov-docker-review
    prompt: "Review this Dockerfile change before we merge it"
    must_load: [docker-review]
    allowed_companions: [docker]   # review skill defers authoring standards to docker
    must_not_load: [kubernetes]
  - id: cov-documentation
    prompt: "Write the README with setup instructions for new contributors"
    must_load: [documentation]
    must_not_load: []
  - id: cov-fastapi-review
    prompt: "Review the FastAPI app - the async routes and the Depends usage"
    must_load: [fastapi-review]
    allowed_companions: [python-review]
    must_not_load: [api-design]
  - id: cov-kubernetes
    prompt: "Fix the deployment manifest - pods keep restarting"
    must_load: [kubernetes]
    must_not_load: [docker]
  - id: cov-llm-evaluation
    prompt: "Build an eval set that catches prompt regressions before deploy"
    must_load: [llm-evaluation]
    must_not_load: [prompt-engineering]
  - id: cov-observability
    prompt: "Instrument this service with metrics and a health check"
    must_load: [observability]
    must_not_load: [verification]
  - id: cov-prompt-engineering
    prompt: "The model ignores my output format instructions - fix the system prompt"
    must_load: [prompt-engineering]
    must_not_load: [llm-evaluation]
  - id: cov-python-performance
    prompt: "This data processing script is too slow on big files - speed it up"
    must_load: [python-performance]
    must_not_load: [python-review, python-refactor]
  - id: cov-python-refactor
    prompt: "Extract the parsing logic into its own module without changing behavior"
    must_load: [python-refactor]
    must_not_load: [python-review, python-layout]
  - id: cov-python-review
    prompt: "Review this Python module before it ships"
    must_load: [python-review]
    must_not_load: [python-refactor, testing]
  - id: cov-release-readiness
    prompt: "Run the release checklist - are we ready to tag v1.2?"
    must_load: [release-readiness]
    allowed_companions: [verification, security-review, git-hygiene, documentation]  # thin checklist skill composes these
    must_not_load: []
  - id: cov-testing
    prompt: "Write tests for the payment calculation - happy path and failure modes"
    must_load: [testing]
    must_not_load: [verification, python-review]
  - id: cov-ui-review
    prompt: "Review the new checkout screen - responsiveness and accessibility"
    must_load: [ui-review]
    must_not_load: [design-system, frontend-layout]
  - id: cov-verification
    prompt: "Verify the repo still works after these moves - run the right checks"
    must_load: [verification]
    must_not_load: [testing, observability]

# v7: ambiguous prompts. must_load is empty on purpose - these rows RECORD what
# routing does on genuinely two-way prompts instead of asserting one answer.
# Plausible skills sit in allowed_companions so precision is not charged.
ambiguous_observation:
  - id: amb-slow-endpoint
    prompt: "The orders endpoint is slow"
    must_load: []
    allowed_companions: [python-performance, fastapi-review, api-design, database-review, observability]
    must_not_load: []
  - id: amb-cleanup-tests
    prompt: "Clean up the test files"
    must_load: []
    allowed_companions: [testing, python-refactor, repository-cleanup, project-layout]
    must_not_load: []
  - id: amb-env-secret
    prompt: "Add the API key to the environment config"
    must_load: []
    allowed_companions: [config-management, web-security, security-review]
    must_not_load: []
  - id: amb-document-api
    prompt: "Document the API endpoints"
    must_load: []
    allowed_companions: [documentation, api-design]
    must_not_load: []

# --- v9 coverage-floor expansion (review P1-6) --------------------------------
# A SECOND positive paraphrase per skill plus hard negatives, so every skill
# meets tests/skills/check_coverage.py's floor (>=2 pos, >=1 neg). Each case
# REUSES an existing seed shape via `seed:` (no new seed-repo.sh entries); ids
# are new so live results stay 1:1 with cases.
coverage_floor:
  - id: cf-agent-design
    seed: cov-agent-design
    prompt: "Design the tool interface and guardrails for our support-triage agent"
    must_load: [agent-design]
    must_not_load: [prompt-engineering]
  - id: cf-prompt-engineering
    seed: cov-agent-design
    prompt: "The model keeps ignoring the format instructions in this system prompt - fix it"
    must_load: [prompt-engineering]
    must_not_load: [agent-design, llm-evaluation]
  - id: cf-llm-evaluation
    seed: cov-agent-design
    prompt: "Build a golden set and judge whether the new prompt regressed"
    must_load: [llm-evaluation]
    must_not_load: [prompt-engineering]
  - id: cf-api-design
    seed: cov-fastapi-review
    prompt: "Version this REST endpoint and plan the deprecation of the old field"
    must_load: [api-design]
    must_not_load: [api-review, documentation]
  - id: cf-api-review
    seed: review-api-breaking
    prompt: "Does removing this response field break the contract for clients?"
    must_load: [api-review]
    must_not_load: [api-design]
  - id: cf-config-management
    seed: cov-fastapi-review
    prompt: "Where should this per-environment setting live - env var or a config file?"
    must_load: [config-management]
    must_not_load: [security-review]
  - id: cf-dependency-review
    seed: cov-fastapi-review
    prompt: "Audit requirements.txt for unused and duplicate packages"
    must_load: [dependency-review]
    must_not_load: [security-review]
  - id: cf-documentation
    seed: cov-fastapi-review
    prompt: "Write the README setup section and a .env.example for this service"
    must_load: [documentation]
    must_not_load: [config-management]
  - id: cf-python-review
    seed: cov-fastapi-review
    prompt: "Check this Python module for error-handling and resource-safety bugs before merge"
    must_load: [python-review]
    must_not_load: [python-refactor, dependency-review]
  - id: cf-python-refactor
    seed: cov-fastapi-review
    prompt: "Extract this long function into a module without changing behavior"
    must_load: [python-refactor]
    must_not_load: [python-performance, python-review]
  - id: cf-python-performance
    seed: cov-fastapi-review
    prompt: "This loader is too slow on big files - profile it and speed it up"
    must_load: [python-performance]
    must_not_load: [python-refactor]
  - id: cf-testing
    seed: cov-fastapi-review
    prompt: "Add test coverage for this parser, including a property-based case"
    must_load: [testing]
    must_not_load: [verification]
  - id: cf-verification
    seed: cov-fastapi-review
    prompt: "Which checks should I run to confirm this change did not break anything?"
    must_load: [verification]
    must_not_load: [testing]
  - id: cf-observability
    seed: cov-fastapi-review
    prompt: "Add metrics and structured logging around the orders endpoint"
    must_load: [observability]
    must_not_load: []
  - id: cf-fastapi-review
    seed: cov-fastapi-review
    prompt: "Review this FastAPI route and its Depends usage before we ship it"
    must_load: [fastapi-review]
    must_not_load: [api-design]
  - id: cf-docker
    seed: cov-docker
    prompt: "This image is huge and runs as root - fix the Dockerfile"
    must_load: [docker]
    must_not_load: [docker-review]
  - id: cf-docker-review
    seed: cov-docker
    prompt: "Review this Dockerfile change before we build and push it"
    must_load: [docker-review]
    must_not_load: [docker]
  - id: cf-kubernetes
    seed: cov-kubernetes
    prompt: "Add resource limits and a liveness probe to this Deployment"
    must_load: [kubernetes]
    must_not_load: []
  - id: cf-database-migrations
    seed: cov-database-migrations
    prompt: "Write a zero-downtime migration to add a nullable column"
    must_load: [database-migrations]
    must_not_load: [database-review]
  - id: cf-database-review
    seed: review-proc-deadlock
    prompt: "Is this stored procedure safe under concurrency - check the transaction scope"
    must_load: [database-review]
    must_not_load: [ssis-review, database-migrations]
  - id: cf-etl-review
    seed: review-etl-counts
    prompt: "The nightly load is dropping rows - reconcile source to target"
    must_load: [etl-review]
    must_not_load: [ssis-review]
  - id: cf-ssis-review
    seed: review-dtsx-thai
    prompt: "Dates in the SSIS load are 543 years off - what is wrong?"
    must_load: [ssis-review]
    must_not_load: [etl-review]
  - id: cf-airflow-review
    seed: dag-add-retry
    prompt: "Is this DAG change safe to deploy - check the schedule and backfill"
    must_load: [airflow-review]
    allowed_companions: [airflow]
    must_not_load: [etl-review]
  - id: cf-airflow-layout
    seed: layout-dags-by-team
    prompt: "What is the naming convention and folder for a new DAG here?"
    must_load: [airflow-layout]
    must_not_load: [airflow]
  - id: cf-ci-review
    seed: review-gha-change
    prompt: "Review this workflow edit for security and pinned action versions"
    must_load: [ci-review]
    must_not_load: [release-readiness]
  - id: cf-security-review
    seed: secret-scan-repo
    prompt: "Scan this repo for committed API keys and connection strings"
    must_load: [security-review]
    must_not_load: [config-management]
  - id: cf-web-security
    seed: login-session-cookies
    prompt: "Harden this login - secure the session cookie and add CSRF protection"
    must_load: [web-security]
    must_not_load: [security-review]
  - id: cf-design-system
    seed: cov-design-system
    prompt: "Should this new button be a variant or a separate shared component?"
    must_load: [design-system]
    must_not_load: [ui-review, frontend-layout]
  - id: cf-ui-review
    seed: cov-design-system
    prompt: "Review this screen change for accessibility and responsive states"
    must_load: [ui-review]
    must_not_load: [design-system]
  - id: cf-frontend-layout
    seed: layout-frontend-components
    prompt: "Where should this React hook and its store slice live?"
    must_load: [frontend-layout]
    must_not_load: [design-system, project-layout]
  - id: cf-project-layout
    seed: layout-root-mess
    prompt: "Propose a standard top-level folder structure for this service"
    must_load: [project-layout]
    must_not_load: [python-layout, repository-cleanup]
  - id: cf-python-layout
    seed: layout-python-importable
    prompt: "Turn these loose scripts into an installable package with entry points"
    must_load: [python-layout]
    must_not_load: [project-layout]
  - id: cf-sql-layout
    seed: layout-sql-proc-file
    prompt: "How should we name and file these stored-procedure scripts?"
    must_load: [sql-layout]
    must_not_load: [database-review]
  - id: cf-repository-cleanup
    seed: cleanup-repo-recall
    prompt: "Find unused files and declutter this repo for handover"
    must_load: [repository-cleanup]
    must_not_load: [project-layout]
  - id: cf-release-readiness
    seed: cov-release-readiness
    prompt: "Run the pre-release checklist and prep the changelog for the tag"
    must_load: [release-readiness]
    must_not_load: [ci-review]

