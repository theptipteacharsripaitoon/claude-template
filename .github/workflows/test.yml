name: template-tests
on:
  push:
  pull_request:

jobs:
  hooks-and-catalog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8   # v5.0.0
      - name: Hook regression suite
        run: bash tests/hooks/run-tests.sh
      - name: Hook installer end-to-end (embedded functional tests)
        run: bash .claude/hooks/install.sh
      - name: ShellCheck all hooks
        run: shellcheck .claude/hooks/*.sh tests/hooks/run-tests.sh
      - name: Skill catalog consistency
        run: |
          python -m pip install --quiet pyyaml
          python tests/skills/check_catalog.py
