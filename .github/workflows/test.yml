name: template-tests
on:
  push:
  pull_request:

# Least privilege (ci-review skill item 2): this workflow only reads the repo.
permissions:
  contents: read

jobs:
  hooks-and-catalog:
    runs-on: ubuntu-latest
    timeout-minutes: 10 # bound the job (ci-review skill item 7)
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - name: Hook regression suite
        run: bash tests/hooks/run-tests.sh
      - name: Hook installer end-to-end (embedded functional tests)
        run: bash .claude/hooks/install.sh
      - name: ShellCheck all hooks
        # -x + -P so the shared lib.sh source is followed from the hooks dir
        # (otherwise SC1091 "not following" trips the gate).
        run: shellcheck -x -P .claude/hooks .claude/hooks/*.sh tests/hooks/run-tests.sh
      - name: Skill catalog consistency
        run: |
          python -m pip install --quiet 'pyyaml==6.0.2'
          python tests/skills/check_catalog.py
