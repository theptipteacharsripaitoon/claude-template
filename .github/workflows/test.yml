name: template-tests
on:
  push:
  pull_request:

# Least privilege (ci-review skill item 2): this workflow only reads the repo.
permissions:
  contents: read

# A newer push to the same ref supersedes any in-flight run (ci-review skill:
# concurrency + cancellation).
concurrency:
  group: template-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  offline:
    name: offline (${{ matrix.os }})
    strategy:
      # Report every platform even if one fails, so a Windows-only portability
      # issue never hides the Linux result (or vice versa).
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2022]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20 # bound the job (ci-review skill item 7); Windows Git Bash
    # spawns ~600 subprocesses across the hook/corpus/installer suites and runs
    # ~13 min, so give headroom over the observed time.
    defaults:
      run:
        shell: bash # Git Bash on Windows — the supported Windows shell for this repo
    env:
      SHELLCHECK_VERSION: v0.10.0
      SHELLCHECK_SHA256: 6c881ab0698e4e6ea235245f22832860544f17ba386442fe7e9d629f8cbedf87
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
      - name: Install PyYAML
        run: python -m pip install --quiet 'pyyaml==6.0.2'
      - name: Install pinned ShellCheck (Linux gates on it; Windows skips it)
        if: runner.os == 'Linux'
        # The runner image ships *some* ShellCheck; install the exact release
        # this repo is validated against, checksum-verified.
        run: |
          curl -fsSL -o /tmp/shellcheck.tar.xz \
            "https://github.com/koalaman/shellcheck/releases/download/${SHELLCHECK_VERSION}/shellcheck-${SHELLCHECK_VERSION}.linux.x86_64.tar.xz"
          echo "${SHELLCHECK_SHA256}  /tmp/shellcheck.tar.xz" | sha256sum -c -
          tar -xJf /tmp/shellcheck.tar.xz -C /tmp
          sudo install "/tmp/shellcheck-${SHELLCHECK_VERSION}/shellcheck" /usr/local/bin/shellcheck
          shellcheck --version
      - name: Tool check
        run: |
          bash --version | head -1
          git --version
          jq --version
          python --version
      - name: Offline verification (single entrypoint — all suites)
        run: bash tests/verify-offline.sh
      # The live skill-routing and realistic-session evaluations need an
      # authenticated Claude Code session and real model calls, so they run
      # out-of-band, not in CI; their exact-SHA evidence lives under
      # tests/skills/results/ and tests/sessions/results/. verify-offline.sh
      # gates on the OFFLINE halves (scorers, parsers, results-consistency).
